<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve Your Spot - Sports Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Admin Panel Style Background */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #7a73e6; /* Purple background like admin panel */
            margin: 0; 
            padding: 40px 20px; 
            min-height: 100vh;
        }

        .booking-container { 
            max-width: 900px; 
            margin: auto; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: #27ae60; font-size: 28px; margin: 0; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
        .form-group input, .form-group select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; 
        }

        /* Slots Styling */
        .slots-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 15px; 
            margin-top: 15px; 
        }

        .slot-option input { display: none; }

        .slot-label { 
            display: block; 
            padding: 15px 10px; 
            text-align: center; 
            border: 2px solid #27ae60; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-weight: bold;
            background: white;
            color: #27ae60;
        }

        /* Hover effect for available slots */
        .slot-label:hover { background: #f0fff4; }

        /* Selected Slot (The one the user clicks) */
        .slot-option input:checked + .slot-label { 
            background: #219653 !important; 
            color: white !important; 
            border-color: #1b5e20;
        }

        /* Booked Slots (Represented in Green as requested, but disabled) */
        .slot-option input:disabled + .slot-label { 
            background: #e8f5e9; 
            border-color: #27ae60; 
            color: #27ae60; 
            opacity: 0.6;
            cursor: not-allowed; 
        }

        .btn-confirm { 
            width: 100%; 
            background: #27ae60; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 30px; 
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }

        .btn-confirm:hover { background: #219653; transform: translateY(-2px); }

        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="booking-container">
    <div class="header">
        <h2><i class="fas fa-calendar-check"></i> Reserve Your Spot</h2>
    </div>

    <form action="/book" method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Select Date</label>
                <input type="date" name="date" id="date-picker" value="{{ date }}" min="{{ today_date }}" required onchange="updateDate()">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="9876543210" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Select Sport</label>
                <select name="sport" required>
                    <option value="Football">Football</option>
                    <option value="Cricket">Cricket</option>
                </select>
            </div>
            <div class="form-group">
                <label>Select Turf</label>
                <select name="turf" required>
                    <option value="Turf A1">Turf A1</option>
                    <option value="Turf A2">Turf A2</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Select Time Slot</label>
            <div class="slots-grid">
                {% for slot in slots %}
                <div class="slot-option">
                    <input type="radio" name="slot" value="{{ slot }}" id="slot_{{ loop.index }}" 
                           {% if slot in booked %} disabled {% endif %} required>
                    <label for="slot_{{ loop.index }}" class="slot-label">
                        {{ slot }}
                        {% if slot in booked %}<br><small>(Booked)</small>{% endif %}
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>

        <button type="submit" class="btn-confirm">
            <i class="fas fa-check-circle"></i> Confirm Booking Request
        </button>
    </form>
</div>

<script>
    function updateDate() {
        const date = document.getElementById('date-picker').value;
        window.location.href = "/booking?date=" + date;
    }
</script>

</body>
</html>
