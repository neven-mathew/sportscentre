<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Slot - Sports Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .booking-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        /* Slots Styling */
        .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 10px; }
        .slot-option input { display: none; }
        .slot-label { display: block; padding: 12px; text-align: center; border: 2px solid #27ae60; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 14px; font-weight: 500; }
        .slot-option input:checked + .slot-label { background: #27ae60; color: white; }
        .slot-option input:disabled + .slot-label { background: #f0f0f0; border-color: #ddd; color: #ccc; cursor: not-allowed; }

        .btn-confirm { width: 100%; background: #27ae60; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-confirm:hover { background: #219653; }
    </style>
</head>
<body>

<div class="booking-container">
    <h2 style="text-align: center; color: #27ae60;"><i class="fas fa-calendar-alt"></i> Reserve Your Spot</h2>
    <form action="/book" method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Select Date</label>
                <input type="date" name="date" id="date-picker" value="{{ date }}" min="{{ today_date }}" required onchange="updateDate()">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Select Sport</label>
                <select name="sport" required>
                    <option value="Football">Football</option>
                    <option value="Cricket">Cricket</option>
                </select>
            </div>
            <div class="form-group">
                <label>Select Turf</label>
                <select name="turf" required>
                    <option value="Turf A1">Turf A1</option>
                    <option value="Turf A2">Turf A2</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Select Time Slot</label>
            <div class="slots-grid">
                {% for slot in slots %}
                <div class="slot-option">
                    <input type="radio" name="slot" value="{{ slot }}" id="slot_{{ loop.index }}" 
                           {% if slot in booked %} disabled {% endif %} required>
                    <label for="slot_{{ loop.index }}" class="slot-label">
                        {{ slot }}
                        {% if slot in booked %}<br><small>(Full)</small>{% endif %}
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>

        <button type="submit" class="btn-confirm"><i class="fas fa-check-circle"></i> Confirm Booking</button>
    </form>
</div>

<script>
    function updateDate() {
        const date = document.getElementById('date-picker').value;
        window.location.href = "/booking?date=" + date;
    }
</script>

</body>
</html>
