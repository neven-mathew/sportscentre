<!DOCTYPE html>
<html>

<head>
<title>Cancel Booking</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h2>Cancel Booking</h2>

{% if booking %}
<p><strong>Name:</strong> {{ booking[1] }}</p>
<p><strong>Sport:</strong> {{ booking[2] }}</p>
<p><strong>Turf:</strong> {{ booking[3] }}</p>
<p><strong>Time:</strong> {{ booking[4] }}</p>
<p><strong>Date:</strong> {{ booking[5] }}</p>

<!-- ================= CANCEL CONFIRM BUTTON ================= -->
<form action="/confirmcancel/{{ booking[0] }}" method="POST" style="display: inline;">
    <button type="submit" class="cancelbtn">Confirm Cancel</button>
</form>
<!-- ========================================================= -->

{% else %}
<p>Booking not found.</p>
{% endif %}

<br><br>

<a href="/">
<button>Go Back</button>
</a>

</body>

</html>
